<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spudy - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body class="bg-[#0d1117] text-gray-400 font-sans antialiased min-h-screen">
    
    <nav class="flex items-center justify-between bg-[#0d1117] px-6 py-3 border-b border-gray-800 text-sm font-medium tracking-wide">
        <div class="flex items-center space-x-6">
            <div class="text-blue-400">
                <img src="./img/logo.jpg" alt="Spudy Logo" class="w-8 h-8 rounded-full overflow-hidden object-cover">
            </div>

            <ul class="flex items-center space-x-6 text-gray-400">
                <li>
                    <a href="/" class="text-white font-semibold pb-3 pt-1">Dashboard</a>
                </li>
                <li>
                    <a href="/settings" class="hover:text-gray-200 transition-colors">Settings</a>
                </li>
            </ul>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-semibold text-white tracking-tight">Recent Requests (Webhooks)</h2>
            <span class="text-xs bg-gray-800 text-gray-300 px-2 py-1 rounded-md border border-gray-700">max: 50 requests</span>
        </div>

        <div class="w-full overflow-x-auto rounded-lg border border-gray-800 bg-[#161b22]">
            <table class="w-full text-left border-collapse text-sm">
                <thead>
                    <tr class="border-b border-gray-800 bg-[#0d1117]/50 text-gray-400 font-medium">
                        <th class="p-4 w-44">Telegram ID</th>
                        <th class="p-4 w-48">Webhook</th>
                        <th class="p-4">Payload Preview</th>
                        <th class="p-4 w-40">Date</th>
                        <th class="p-4 w-28 text-center">Status</th>
                    </tr>
                </thead>

                <tbody id="logs-table-body" class="divide-y divide-gray-800/60 text-gray-300">
                    <tr>
                        <td colspan="5" class="p-8 text-center text-gray-500 font-medium">Loading logs...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        $(document).ready(function() {
            loadDashboardLogs();
        });

        function loadDashboardLogs() {
            const $tableBody = $('#logs-table-body');

            $.getJSON('/api/dashboard/logs?limit=50')
                .done(function(logs) {
                    if (!logs || logs.length === 0) {
                        $tableBody.html(`
                            <tr>
                                <td colspan="5" class="p-8 text-center text-gray-500 font-medium">History of requests is empty</td>
                            </tr>
                        `);
                        return;
                    }

                    let rowsHtml = '';

                    $.each(logs, function(index, log) {
                        const isSuccess = log.status === 1;
                        
                        const statusBadge = isSuccess 
                            ? `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-500/10 text-green-400 border border-green-500/20">Success</span>`
                            : `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-500/10 text-red-400 border border-red-500/20">Error</span>`;

                        const payloadColorClass = isSuccess ? 'text-green-400/90' : 'text-red-400/90';

                        const errorDisplay = (!isSuccess && log.error_message) 
                            ? `<div class="text-[11px] text-gray-500 mt-1 font-sans">❌ Error: ${escapeHtml(log.error_message)}</div>` 
                            : '';

                        rowsHtml += `
                            <tr class="hover:bg-gray-800/30 transition-colors">
                                <td class="p-4 font-mono text-gray-400 whitespace-nowrap">
                                    ${escapeHtml(log.username || 'User')} 
                                    <span class="text-xs text-gray-600">(${escapeHtml(log.telegram_id)})</span>
                                </td>
                                <td class="p-4 text-blue-400 truncate max-w-[180px] font-mono text-xs" title="${escapeHtml(log.webhook_name)}">
                                    ${escapeHtml(log.webhook_name)}
                                </td>
                                <td class="p-4">
                                    <div class="max-w-md truncate font-mono text-xs bg-[#0d1117] p-2 rounded border border-gray-800 ${payloadColorClass}" title="${escapeHtml(log.payload_preview)}">
                                        ${escapeHtml(log.payload_preview)}
                                    </div>
                                    ${errorDisplay}
                                </td>
                                <td class="p-4 text-xs text-gray-500 whitespace-nowrap">
                                    ${log.created_at ? log.created_at.replace('T', ' ').split('.')[0] : ''}
                                </td>
                                <td class="p-4 text-center whitespace-nowrap">
                                    ${statusBadge}
                                </td>
                            </tr>
                        `;
                    });

                    $tableBody.html(rowsHtml);
                })
                .fail(function(error) {
                    console.error('Error to load dashboard logs:', error);
                    $tableBody.html(`
                        <tr>
                            <td colspan="5" class="p-8 text-center text-red-400 font-medium">Error loading dashboard logs</td>
                        </tr>
                    `);
                });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return $('<div>').text(str).html();
        }
    </script>
</body>
</html>
